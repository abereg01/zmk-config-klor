# Encoder support (EC11 rotary encoders)
CONFIG_EC11=y
CONFIG_EC11_TRIGGER_GLOBAL_THREAD=y

# Split keyboard support
CONFIG_ZMK_SPLIT=y
CONFIG_ZMK_USB=y

# Bluetooth — used for BLE split communication AND Prospector display pairing
CONFIG_ZMK_BLE=y
CONFIG_ZMK_BLE_PASSKEY_ENTRY=n

# OLED display — disabled (no OLED physically connected to PCB)
# CONFIG_ZMK_DISPLAY=y

# RGB underglow — disabled (no RGB LEDs installed)
# CONFIG_ZMK_RGB_UNDERGLOW=y
# CONFIG_WS2812_STRIP=y
# CONFIG_ZMK_RGB_UNDERGLOW_HUE_START=40