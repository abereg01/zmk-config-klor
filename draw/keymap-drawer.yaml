parse_config:
  zmk_additional_includes:
    - ../config/boards/shields/klor

  raw_binding_map:
    "&td_a":          { t: A, h: GUI/Ä }
    "&td_nav_num":    { t: NAV, h: "NUM ⇕" }
    "&td_apos_grave": { t: "'", h: "`" }
    "&macro_siai":    SIAI

  trans_legend: { "t": "", "type": "trans" }

  zmk_keycode_map:
    # Modifiers
    LALT:  Alt
    RALT:  Alt
    LCTRL: Ctrl
    RCTRL: Ctrl
    LGUI:  Gui
    RGUI:  Gui
    LSHFT: Shift
    RSHFT: Shift

    # Common keys
    BSPC:  Bspc
    DEL:   Del
    ESC:   Esc
    RET:   Enter
    SPACE: Spc
    TAB:   Tab

    # Navigation
    PG_UP: PgUp
    PG_DN: PgDn
    INS:   Ins
    HOME:  Home
    END:   End

    # Arrows
    UP:    ↑
    DOWN:  ↓
    LEFT:  ←
    RIGHT: →

    # Media — rendered as MDI glyphs
    C_MUTE:   $$mdi:volume-off$$
    C_PP:     $$mdi:play-pause$$
    C_VOL_UP: $$mdi:volume-high$$
    C_VOL_DN: $$mdi:volume-medium$$
    C_NEXT:   $$mdi:skip-forward$$
    C_PREV:   $$mdi:skip-backward$$

    # Symbols
    AMPERSAND:        "&"
    AMPS:             "&"
    APOS:             "'"
    APOSTROPHE:       "'"
    ASTERISK:         "*"
    ASTRK:            "*"
    AT:               "@"
    AT_SIGN:          "@"
    BACKSLASH:        \
    BSLH:             \
    CARET:            ^
    COLON:            ":"
    COMMA:            ","
    DLLR:             $
    DOLLAR:           $
    DOT:              .
    DOUBLE_QUOTES:    '"'
    DQT:              '"'
    EQUAL:            "="
    EXCL:             "!"
    EXCLAMATION:      "!"
    FSLH:             /
    GRAVE:            "`"
    GREATER_THAN:     ">"
    GT:               ">"
    HASH:             "#"
    LBKT:             "["
    LBRC:             "{"
    LEFT_BRACE:       "{"
    LEFT_BRACKET:     "["
    LEFT_PARENTHESIS: (
    LESS_THAN:        <
    LPAR:             (
    LT:               <
    MINUS:            "-"
    NON_US_BACKSLASH: \
    NON_US_BSLH:      "|"
    NON_US_HASH:      "#"
    NUHS:             "#"
    PERCENT:          "%"
    PERIOD:           .
    PIPE:             "|"
    PIPE2:            "|"
    PLUS:             +
    POUND:            "#"
    PRCNT:            "%"
    QMARK:            "?"
    QUESTION:         "?"
    RBKT:             "]"
    RBRC:             "}"
    RIGHT_BRACE:      "}"
    RIGHT_BRACKET:    "]"
    RIGHT_PARENTHESIS: )
    RPAR:             )
    SEMI:             ;
    SEMICOLON:        ;
    SINGLE_QUOTE:     "'"
    SLASH:            /
    SQT:              "'"
    STAR:             "*"
    TILDE:            "~"
    TILDE2:           "~"
    UNDER:            _
    UNDERSCORE:       _

# ---------------------------------------------------------------------------
draw_config:
  append_colon_to_layer_header: false
  dark_mode: false        # false = light default + CSS dark-mode media query
  footer_text: "KLOR — ZMK keymap"

  # Glyph sizes (MDI icons)
  glyph_tap_size:     15
  glyph_hold_size:    12
  glyph_shifted_size: 10

  # Layout geometry
  key_h:   56
  key_w:   60
  split_gap: 24
  combo_w: 30
  combo_h: 24

  # Padding & spacing
  legend_rel_y: 1
  outer_pad_w:  10
  outer_pad_h:  10
  small_pad:    4

  # Combos shown as separate diagram below the keymap
  separate_combo_diagrams: true
  combo_diagrams_scale: 2

  svg_style: |
    svg path { fill: inherit; }

    /* =====================================================================
       THEME: Gruvbox Light  (default)
       To switch themes, replace the --color-* values below.

       Gruvbox Light  → already set
       Gruvbox Dark   → uncomment the dark block and remove this light block
       Nord           → see commented block below
       Dracula        → see commented block below
       ===================================================================== */
    svg.keymap {
        /* --- Gruvbox Light --- */
        --color-bg:      #7c6f64;
        --color-key:     #fbf1c7;
        --color-text:    #3c3836;
        --color-ghost:   #928374;
        --color-dendron: #d5c4a1;
        --color-held:    #bdae93;

        /* Layer-indicator accent colours */
        --color-fn:      #458588;   /* teal  — top-left  */
        --color-nav:     #d79921;   /* gold  — top-right */
        --color-num:     #d65d0e;   /* burnt — bot-left  */
        --color-sys:     #689d6a;   /* green — bot-right */

        fill: var(--color-text);
        background-color: var(--color-bg);
        font-family: Calibri, system-ui, sans-serif;
        font-size: 16px;
        font-kerning: normal;
        text-rendering: optimizeLegibility;
    }

    /* --- Gruvbox Dark (alternative — swap with block above) ---
    svg.keymap {
        --color-bg:      #282828;
        --color-key:     #3c3836;
        --color-text:    #ebdbb2;
        --color-ghost:   #504945;
        --color-dendron: #504945;
        --color-held:    #665c54;
        --color-fn:      #83a598;
        --color-nav:     #fabd2f;
        --color-num:     #fe8019;
        --color-sys:     #8ec07c;
    } */

    /* --- Nord (alternative) ---
    svg.keymap {
        --color-bg:      #3b4252;
        --color-key:     #eceff4;
        --color-text:    #2e3440;
        --color-ghost:   #4c566a;
        --color-dendron: #d8dee9;
        --color-held:    #e5e9f0;
        --color-fn:      #5e81ac;
        --color-nav:     #ebcb8b;
        --color-num:     #d08770;
        --color-sys:     #a3be8c;
    } */

    /* --- Dracula (alternative) ---
    svg.keymap {
        --color-bg:      #282a36;
        --color-key:     #44475a;
        --color-text:    #f8f8f2;
        --color-ghost:   #6272a4;
        --color-dendron: #44475a;
        --color-held:    #6272a4;
        --color-fn:      #8be9fd;
        --color-nav:     #f1fa8c;
        --color-num:     #ffb86c;
        --color-sys:     #50fa7b;
    } */

    /* ---- Typography ---- */
    text {
        text-anchor: middle;
        dominant-baseline: middle;
        letter-spacing: 0.02em;
    }

    text.tap     { font-weight: 500; }
    text.hold    { font-weight: 400; font-size: 13px; }
    text.shifted { font-weight: 400; font-size: 11px; }
    text.combo, text.left, text.right,
    text.tl, text.tr, text.bl, text.br { font-size: 10px; }

    text.hold, text.bl, text.br    { text-anchor: middle; dominant-baseline: auto; }
    text.shifted, text.tl, text.tr { text-anchor: middle; dominant-baseline: hanging; }
    text.left, text.tl, text.bl   { text-anchor: start; }
    text.right, text.tr, text.br  { text-anchor: end; }

    text.layer-activator { text-decoration: underline; }
    text.combo.hold, text.combo.shifted,
    text.combo.left, text.combo.right { font-size: 8px; }

    /* ---- Labels & footer ---- */
    text.label, text.footer {
        fill: var(--color-key);
        stroke: var(--color-bg);
        stroke-width: 4;
        paint-order: stroke;
    }
    text.label  { font-weight: bold; text-anchor: start; }
    text.footer { text-anchor: end; dominant-baseline: auto; }

    /* ---- Key surfaces ---- */
    rect.key, rect.combo, rect.combo-separate { fill: var(--color-key); stroke-width: 0; }
    rect.held, rect.combo.held                { fill: var(--color-held); }
    .layer-Combos rect.key                    { fill: var(--color-ghost); }

    /* ---- Combo dendrons ---- */
    path.combo {
        stroke: var(--color-dendron);
        stroke-width: 2;
        stroke-dasharray: 2, 3;
        opacity: 0.45;
        fill: none;
    }

    /* ---- Corner accent colours ---- */
    text.tl, use.tl { fill: var(--color-fn); }
    text.tr, use.tr { fill: var(--color-nav); }
    text.bl, use.bl { fill: var(--color-num); }
    text.br, use.br { fill: var(--color-sys); }

    /* ---- Tabler icon compatibility ---- */
    .icon-tabler > path                             { fill: inherit; stroke: inherit; stroke-width: 2; }
    .icon-tabler > path[stroke="none"][fill="none"] { visibility: hidden; }

    /* ---- Auto dark mode (follows OS preference) ---- */
    @media (prefers-color-scheme: dark) {
        svg.keymap {
            --color-bg:      #a89984;
            --color-key:     #282828;
            --color-text:    #ebdbb2;
            --color-ghost:   #928374;
            --color-dendron: #504945;
            --color-held:    #665c54;

            --color-fn:      #458588;
            --color-nav:     #fabd2f;
            --color-num:     #d65d0e;
            --color-sys:     #689d6a;
        }
    }
