# Hand-curated keymap-drawer YAML for Geist KLOR (LAYOUT_saegewerk, 38 keys)
# Style: urob/zmk-config — two-layer SVG (Base + Combos) with color-coded corner legends
#
# Corner legend conventions:
#   tl (blue, FN/SYS) ← FN layer F-keys + SYSTEM layer bindings (keys without F-key share tl)
#   tr (yellow, NAV)  ← NAV layer bindings
#   bl (orange, NUM)  ← NUM layer digits / numpad
#   br (green, SYS)   ← RAISE layer bindings
#
# Layers folded in: BASE, NAV, NUM, RAISE, SYSTEM.
# Dropped:
#   SCROLL  — encoder-only modifier; surfaced via the hold legend on saeg pos 26 + footer note.
#   LEADER  — sticky-layer-only; entered via combo S+D+F (shown on the Combos page).
#
# Index space: this file uses LAYOUT_saegewerk's 0..37 indices, which differ from
# the raw keymap's 44-slot binding-array indices. The six polydactyl positions not
# present on saegewerk (10, 21, 22, 35, 39, 40 — all &trans on this board) are
# omitted, and the remaining 38 keys are re-indexed in order.

layout:
  qmk_keyboard: klor
  layout_name: LAYOUT_saegewerk

# Encoders are not modeled by the KLOR physical layout in keymap-drawer (no sensor
# positions defined), so both are surfaced as tap/hold legends on their closest key pos:
#   Left encoder  (pos 25): tap = ↑/↓ (rotate),  hold = Enter (press)
#   Right encoder (pos 26): tap = ↑/↓ (rotate),  hold = ←/→  (hold &mo SCROLL → horizontal)
#
# Note: a `draw_config.footer_text` override would normally carry this note, but
# keymap-drawer's YAML-level draw_config merge drops the custom `svg_style` from
# keymap-drawer.yaml (svg_style has `exclude=True` in the Config model), which
# kills the gruvbox theme. So we leave draw_config alone and surface the encoder
# state through the hold-legend on pos 26 + this comment.

layers:
  Base:
    # ───── Top row (positions 0–9) ───────────────────────────────────────────
    - {t: Q,              br: BT1}                                     # 0
    - {t: W,  bl: F9,     br: BT2}                                     # 1
    - {t: E,  bl: F10,    br: BT3}                                     # 2
    - {t: R,  bl: F11,    br: BT4}                                     # 3
    - {t: T,  bl: F12,    br: Out}                                     # 4
    - {t: Y,              tr: PgUp}                                    # 5
    - {t: U,                            bl: "7"}                       # 6
    - {t: I,              tr: "$$mdi:arrow-up$$",      bl: "8"}                       # 7
    - {t: O,                            bl: "9"}                       # 8
    - {t: P,  s: Å,       tr: Home}                                    # 9 — &td_p: double-tap=Å
    # ───── Home row (positions 10–19) ────────────────────────────────────────
    - {t: A,  h: "$$mdi:microsoft-windows$$", s: Ä}                                 # 10 — &td_a: double-tap=Ä
    - {t: S,  h: "$$mdi:apple-keyboard-option$$",    bl: F5}           # 11 — &hm LALT S
    - {t: D,  h: "$$mdi:apple-keyboard-shift$$",     bl: F6}           # 12 — &hm LSHFT D
    - {t: F,  h: "$$mdi:apple-keyboard-control$$",   bl: F7}           # 13 — &hm LCTRL F
    - {t: G,              bl: F8}                                      # 14
    - {t: H,              tr: PgDn,                br: Bspc}           # 15
    - {t: J,  h: "$$mdi:microsoft-windows$$",   tl: PDesk, tr: "$$mdi:arrow-left$$", bl: "4"}  # 16 — &hm RGUI J
    - {t: K,  h: "$$mdi:apple-keyboard-shift$$",               tr: "$$mdi:arrow-down$$", bl: "5"}  # 17 — &hm RSHFT K
    - {t: L,  h: "$$mdi:apple-keyboard-option$$",  tl: NDesk, tr: "$$mdi:arrow-right$$", bl: "6"}  # 18 — &hm RALT L
    - {t: ";", h: "$$mdi:apple-keyboard-control$$", tr: End,            br: Ö}    # 19 — &hm RCTRL SEMI
    # ───── Bottom row + 2 middle thumbs (positions 20–31) ────────────────────
    - {t: Z,              br: BTclr}                                   # 20
    - {t: X,              bl: F1}                                      # 21
    - {t: C,              bl: F2}                                      # 22
    - {t: V,              bl: F3}                                      # 23
    - {t: B,              bl: F4}                                      # 24
    - {t: "$$mdi:swap-vertical$$", h: "$$mdi:keyboard-return$$"}                                              # 25 — left enc: rotate=↑/↓, press=Enter
    - {t: "$$mdi:swap-vertical$$", h: "$$mdi:swap-horizontal$$"}                                             # 26 — &mo SCROLL: rotate=↑/↓, hold→rotate=←/→
    - {t: N}                                                           # 27
    - {t: M,                            bl: "1"}                       # 28
    - {t: ",",  tl: "$$mdi:skip-backward$$", bl: "2"}                   # 29 — &mm_comma; SYSTEM: C_PREV
    - {t: ".",  tl: "$$mdi:play-pause$$",    bl: "3"}                   # 30 — &mm_dot;   SYSTEM: C_PP
    - {t: "?",  tl: "$$mdi:skip-forward$$"}                             # 31 — &mm_qmark; SYSTEM: C_NEXT
    # ───── Thumb row (positions 32–37) ───────────────────────────────────────
    - {t: SYS}                                                          # 32 — &mo_tog: tap=tog SYSTEM, hold=mo SYSTEM
    - {t: "$$mdi:keyboard-space$$", h: RAISE}                                                # 33 — &lt RAISE SPACE
    - {t: "CMK DH"}                                                     # 34 — &td_colemak: double-tap to toggle Colemak DH
    - {t: "$$mdi:keyboard-return$$"}                                                        # 35
    - {t: "$$mdi:keyboard-space$$", h: RAISE}                                                # 36 — &lt RAISE SPACE
    - {t: NAV, h: "NUM",          bl: "0"}                              # 37 — &td_nav_num

  Colemak DH:
    # ───── Top row (positions 0–9) ───────────────────────────────────────────
    - {t: Q}                                                             # 0
    - {t: W}                                                             # 1
    - {t: F}                                                             # 2
    - {t: P}                                                             # 3
    - {t: B}                                                             # 4
    - {t: J}                                                             # 5
    - {t: L}                                                             # 6
    - {t: U}                                                             # 7
    - {t: Y}                                                             # 8
    - {t: ";", s: Å}                                                    # 9 — &td_semi_aa: double-tap=Å
    # ───── Home row (positions 10–19) ────────────────────────────────────────
    - {t: A,  h: "$$mdi:microsoft-windows$$", s: Ä}                    # 10 — &td_a: double-tap=Ä
    - {t: R,  h: "$$mdi:apple-keyboard-option$$"}                       # 11
    - {t: S,  h: "$$mdi:apple-keyboard-shift$$"}                        # 12
    - {t: T,  h: "$$mdi:apple-keyboard-control$$"}                      # 13
    - {t: G}                                                             # 14
    - {t: M}                                                             # 15
    - {t: N,  h: "$$mdi:microsoft-windows$$"}                           # 16
    - {t: E,  h: "$$mdi:apple-keyboard-shift$$"}                        # 17
    - {t: I,  h: "$$mdi:apple-keyboard-option$$"}                       # 18
    - {t: O,  h: "$$mdi:apple-keyboard-control$$", s: Ö}               # 19 — &td_o_colemak: double-tap=Ö
    # ───── Bottom row + 2 middle thumbs (positions 20–31) ────────────────────
    - {t: Z}                                                             # 20
    - {t: X}                                                             # 21
    - {t: C}                                                             # 22
    - {t: D}                                                             # 23
    - {t: V}                                                             # 24
    - {t: "$$mdi:swap-vertical$$", h: "$$mdi:keyboard-return$$"}                                              # 25 — left enc (same as BASE)
    - {t: "$$mdi:swap-vertical$$", h: "$$mdi:swap-horizontal$$"}                                              # 26 — right enc (same as BASE)
    - {t: K}                                                             # 27
    - {t: H}                                                             # 28
    - {t: ","}                                                           # 29
    - {t: "."}                                                           # 30
    - {t: "?"}                                                           # 31
    # ───── Thumb row (positions 32–37) ───────────────────────────────────────
    - {t: SYS}                                                           # 32
    - {t: "$$mdi:keyboard-space$$", h: RAISE}                                                 # 33
    - {t: "CMK DH"}                                                      # 34 — double-tap to exit Colemak
    - {t: "$$mdi:keyboard-return$$"}                                                         # 35
    - {t: "$$mdi:keyboard-space$$", h: RAISE}                                                 # 36
    - {t: NAV, h: "NUM", bl: "0"}                                        # 37

  Combos:
    # Clean background for the combo diagram — every key rendered as transparent.
    - {type: trans}   # 0
    - {type: trans}   # 1
    - {type: trans}   # 2
    - {type: trans}   # 3
    - {type: trans}   # 4
    - {type: trans}   # 5
    - {type: trans}   # 6
    - {type: trans}   # 7
    - {type: trans}   # 8
    - {type: trans}   # 9
    - {type: trans}   # 10
    - {type: trans}   # 11
    - {type: trans}   # 12
    - {type: trans}   # 13
    - {type: trans}   # 14
    - {type: trans}   # 15
    - {type: trans}   # 16
    - {type: trans}   # 17
    - {type: trans}   # 18
    - {type: trans}   # 19
    - {type: trans}   # 20
    - {type: trans}   # 21
    - {type: trans}   # 22
    - {type: trans}   # 23
    - {type: trans}   # 24
    - {type: trans}   # 25
    - {type: trans}   # 26
    - {type: trans}   # 27
    - {type: trans}   # 28
    - {type: trans}   # 29
    - {type: trans}   # 30
    - {type: trans}   # 31
    - {type: trans}   # 32
    - {type: trans}   # 33
    - {type: trans}   # 34
    - {type: trans}   # 35
    - {type: trans}   # 36
    - {type: trans}   # 37

combos:
  # ── Navigation ──────────────────────────────────────────────────────────────
  - {p: [1, 2],     k: Esc,    l: [Combos]}
  - {p: [3, 4],     k: Del,    l: [Combos]}
  - {p: [5, 6],     k: Del,    l: [Combos]}
  - {p: [11, 12],   k: Tab,    l: [Combos]}
  - {p: [13, 14],   k: Bspc,   l: [Combos]}
  - {p: [15, 16],   k: Bspc,   l: [Combos]}
  - {p: [13, 16],   k: Caps,   l: [Combos]}
  # ── Clipboard ───────────────────────────────────────────────────────────────
  - {p: [21, 22],   k: Copy,   l: [Combos]}
  - {p: [22, 23],   k: Paste,  l: [Combos]}
  - {p: [21, 23],   k: Cut,    l: [Combos], align: bottom, offset: 0.15}
  # ── Symbols: left side ───────────────────────────────────────────────────────
  - {p: [4, 14],    k: "$",                    l: [Combos]}   # T+G  vertical
  - {p: [3, 13],    k: "|",                    l: [Combos]}   # R+F  vertical
  - {p: [0, 1],     k: "~",                    l: [Combos]}   # Q+W
  - {p: [2, 3],     k: "&",                    l: [Combos]}   # E+R
  - {p: [10, 11],   k: "@",                    l: [Combos]}   # A+S
  - {p: [12, 13],   k: "#",                    l: [Combos]}   # D+F
  - {p: [11, 21],   k: "`",                    l: [Combos]}   # S+X  diagonal
  - {p: [20, 21],   k: {t: "/", s: "\\"},      l: [Combos]}   # Z+X
  # ── Symbols: right side ──────────────────────────────────────────────────────
  - {p: [5, 15],    k: "^",                    l: [Combos]}   # Y+H  vertical
  - {p: [7, 17],    k: "*",                    l: [Combos]}   # I+K  vertical
  - {p: [8, 9],     k: {t: "+", s: "="},       l: [Combos]}   # O+P
  - {p: [18, 19],   k: {t: "'", s: '"'},       l: [Combos]}   # L+;
  - {p: [30, 31],   k: {t: "-", s: "_"},       l: [Combos]}   # .+?
  # ── Brackets / parens ───────────────────────────────────────────────────────
  - {p: [6, 7],     k: "(",    l: [Combos]}
  - {p: [7, 8],     k: ")",    l: [Combos]}
  - {p: [16, 17],   k: "{",    l: [Combos]}
  - {p: [17, 18],   k: "}",    l: [Combos]}
  - {p: [28, 29],   k: "[",    l: [Combos]}
  - {p: [29, 30],   k: "]",    l: [Combos]}
  # ── System-layer combos (fn-tinted background) ───────────────────────────────
#  - {p: [11, 12],   k: {t: "Alt+Tab",  type: "fn"}, l: [Combos]}
#  - {p: [21, 22],   k: {t: "⇧Alt+Tab", type: "fn"}, l: [Combos]}
