# Gruvbox theme — https://github.com/morhetz/gruvbox
# Warm retro palette. Light mode with automatic dark-mode via CSS media query.
draw_config:
  dark_mode: false
  svg_style: |
    svg.keymap {
        --color-bg:      #7c6f64;
        --color-key:     #fbf1c7;
        --color-text:    #3c3836;
        --color-ghost:   #928374;
        --color-dendron: #d5c4a1;
        --color-held:    #bdae93;

        --color-fn:      #458588;
        --color-nav:     #d79921;
        --color-num:     #d65d0e;
        --color-sys:     #689d6a;
    }

    @media (prefers-color-scheme: dark) {
        svg.keymap {
            --color-bg:      #a89984;
            --color-key:     #282828;
            --color-text:    #ebdbb2;
            --color-ghost:   #928374;
            --color-dendron: #504945;
            --color-held:    #665c54;

            --color-fn:      #458588;
            --color-nav:     #fabd2f;
            --color-num:     #d65d0e;
            --color-sys:     #689d6a;
        }
    }
