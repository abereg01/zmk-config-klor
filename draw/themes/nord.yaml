# Nord theme — https://www.nordtheme.com
# Cool arctic palette. Light snow-storm base with dark polar-night media query.
draw_config:
  dark_mode: false
  svg_style: |
    svg.keymap {
        /* Nord: Snow Storm base on Frost background */
        --color-bg:      #4c566a;   /* Polar Night 4 */
        --color-key:     #eceff4;   /* Snow Storm 3  */
        --color-text:    #2e3440;   /* Polar Night 1 */
        --color-ghost:   #d8dee9;   /* Snow Storm 1  */
        --color-dendron: #e5e9f0;   /* Snow Storm 2  */
        --color-held:    #d8dee9;   /* Snow Storm 1  */

        --color-fn:      #5e81ac;   /* Frost 4 — blue          */
        --color-nav:     #ebcb8b;   /* Aurora yellow            */
        --color-num:     #d08770;   /* Aurora orange            */
        --color-sys:     #a3be8c;   /* Aurora green             */
    }

    @media (prefers-color-scheme: dark) {
        svg.keymap {
            --color-bg:      #3b4252;   /* Polar Night 2 */
            --color-key:     #2e3440;   /* Polar Night 1 */
            --color-text:    #eceff4;   /* Snow Storm 3  */
            --color-ghost:   #4c566a;   /* Polar Night 4 */
            --color-dendron: #434c5e;   /* Polar Night 3 */
            --color-held:    #434c5e;   /* Polar Night 3 */

            --color-fn:      #88c0d0;   /* Frost 2      */
            --color-nav:     #ebcb8b;   /* Aurora yellow */
            --color-num:     #d08770;   /* Aurora orange */
            --color-sys:     #a3be8c;   /* Aurora green  */
        }
    }
