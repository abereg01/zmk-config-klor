<svg width="982" height="363" viewBox="0 0 982 363" class="keymap" xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink">
<style>svg path { fill: inherit; }

svg.keymap {
    --color-bg:      #7c6f64;
    --color-key:     #fbf1c7;
    --color-text:    #3c3836;
    --color-ghost:   #928374;
    --color-dendron: #d5c4a1;
    --color-held:    #bdae93;

    --color-fn:      #458588;
    --color-nav:     #d79921;
    --color-num:     #d65d0e;
    --color-sys:     #689d6a;

    fill: var(--color-text);
    background-color: var(--color-bg);
    font-family: Calibri, system-ui, sans-serif;
    font-size: 16px;
    font-kerning: normal;
    text-rendering: optimizeLegibility;
}

text {
    text-anchor: middle;
    dominant-baseline: middle;
    letter-spacing: 0.02em;
}

text.tap     { font-weight: 500; }
text.hold    { font-weight: 400; font-size: 13px; }
text.shifted { font-weight: 400; font-size: 11px; }
text.combo, text.left, text.right, text.tl, text.tr, text.bl, text.br { font-size: 10px; }

text.hold, text.bl, text.br    { text-anchor: middle; dominant-baseline: auto; }
text.shifted, text.tl, text.tr { text-anchor: middle; dominant-baseline: hanging; }
text.left, text.tl, text.bl    { text-anchor: start; }
text.right, text.tr, text.br   { text-anchor: end; }

text.layer-activator { text-decoration: underline; }
text.combo.hold, text.combo.shifted, text.combo.left, text.combo.right { font-size: 8px; }

text.label, text.footer {
    fill: var(--color-key);
    stroke: var(--color-bg);
    stroke-width: 4;
    paint-order: stroke;
}
text.label  { font-weight: bold; text-anchor: start; }
text.footer { text-anchor: end; dominant-baseline: auto; }

rect.key, rect.combo, rect.combo-separate { fill: var(--color-key); stroke-width: 0; }
rect.held, rect.combo.held                { fill: var(--color-held); }
.layer-Combos rect.key                    { fill: var(--color-ghost); }

path.combo { stroke: var(--color-dendron); stroke-width: 2; stroke-dasharray: 2, 3; opacity: 0.45; fill: none; }

text.tl, use.tl { fill: var(--color-fn); }
text.tr, use.tr { fill: var(--color-nav); }
text.bl, use.bl { fill: var(--color-num); }
text.br, use.br { fill: var(--color-sys); }

.keypos-30 text.hold { fill: var(--color-nav); }
.keypos-31 text.hold { fill: var(--color-fn); }
.keypos-32 text.hold { fill: var(--color-num); font-size: 15px; }
.keypos-32 text.tap  { fill: var(--color-num); }
.keypos-33 text.hold { font-size: 15px; }

.icon-tabler > path                             { fill: inherit; stroke: inherit; stroke-width: 2; }
.icon-tabler > path[stroke="none"][fill="none"] { visibility: hidden; }

@media (prefers-color-scheme: dark) {
    svg.keymap {
        --color-bg:      #a89984;
        --color-key:     #282828;
        --color-text:    #ebdbb2;
        --color-ghost:   #928374;
        --color-dendron: #504945;
        --color-held:    #665c54;

        --color-fn:      #458588;
        --color-nav:     #fabd2f;
        --color-num:     #d65d0e;
        --color-sys:     #689d6a;
    }
}
</style>
