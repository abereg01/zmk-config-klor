# Hand-curated keymap-drawer YAML for Geist KLOR (LAYOUT_saegewerk, 38 keys)
# Style: urob/zmk-config — two-layer SVG (Base + Combos) with color-coded corner legends
#
# Corner legend conventions:
#   tl (teal, FN)   ← NUM layer F-keys
#   tr (yellow,NAV) ← NAV layer bindings
#   bl (orange,NUM) ← NUM layer digits / numpad
#   br (green, SYS) ← RAISE layer bindings
#
# Layers folded in: BASE, NAV, NUM, RAISE.
# Dropped:
#   SYSTEM  — accessed via left-outer thumb hold; PDesk/NDesk/SIAI not folded into base legends.
#   SCROLL  — encoder-only modifier; surfaced via the hold legend on saeg pos 26 + footer note.
#   LEADER  — sticky-layer-only; entered via combo S+D+F (shown on the Combos page).
#
# Index space: this file uses LAYOUT_saegewerk's 0..37 indices, which differ from
# the raw keymap's 44-slot binding-array indices. The six polydactyl positions not
# present on saegewerk (10, 21, 22, 35, 39, 40 — all &trans on this board) are
# omitted, and the remaining 38 keys are re-indexed in order.

layout:
  qmk_keyboard: klor
  layout_name: LAYOUT_saegewerk

# Encoders are not modeled by the KLOR physical layout in keymap-drawer (no sensor
# positions defined), so the SCROLL layer surfaces as a hold legend on pos 26 only:
#   Left encoder:  rotate = ↑ / ↓
#   Right encoder: rotate = PgUp / PgDn  (vertical scroll)
#                  hold &mo SCROLL on pos 26 → rotate becomes ← / → (horizontal scroll)
#
# Note: a `draw_config.footer_text` override would normally carry this note, but
# keymap-drawer's YAML-level draw_config merge drops the custom `svg_style` from
# keymap-drawer.yaml (svg_style has `exclude=True` in the Config model), which
# kills the gruvbox theme. So we leave draw_config alone and surface the encoder
# state through the hold-legend on pos 26 + this comment.

layers:
  Base:
    # ───── Top row (positions 0–9) ───────────────────────────────────────────
    - {t: Q,              br: BT1}                                     # 0
    - {t: W,  bl: F9,     br: BT2}                                     # 1
    - {t: E,  bl: F10,    br: BT3}                                     # 2
    - {t: R,  bl: F11,    br: BT4}                                     # 3
    - {t: T,  bl: F12,    br: Out}                                     # 4
    - {t: Y,              tr: PgUp}                                    # 5
    - {t: U,                            bl: "7"}                       # 6
    - {t: I,              tr: "↑",      bl: "8"}                       # 7
    - {t: O,                            bl: "9"}                       # 8
    - {t: P,              tr: Home}                                    # 9
    # ───── Home row (positions 10–19) ────────────────────────────────────────
    - {t: A,  h: Gui,                              br: BTclr}          # 10 — &td_a (tap=A/hold=Gui, double-tap=Å)
    - {t: S,  h: Alt,     bl: F5}                                      # 11 — &hm LALT S
    - {t: D,  h: Shift,   bl: F6}                                      # 12 — &hm LSHFT D
    - {t: F,  h: Ctrl,    bl: F7}                                      # 13 — &hm LCTRL F
    - {t: G,              bl: F8}                                      # 14
    - {t: H,              tr: PgDn,                br: Bspc}           # 15
    - {t: J,  h: Gui,     tr: "←",      bl: "4"}                       # 16 — &hm RGUI J
    - {t: K,  h: Shift,   tr: "↓",      bl: "5"}                       # 17 — &hm RSHFT K
    - {t: L,  h: Alt,     tr: "→",      bl: "6"}                       # 18 — &hm RALT L
    - {t: ";", h: Ctrl,   tr: End,                 br: Ö}              # 19 — &hm RCTRL SEMI
    # ───── Bottom row + 2 middle thumbs (positions 20–31) ────────────────────
    - {t: Z}                                                           # 20
    - {t: X,              bl: F1}                                      # 21
    - {t: C,              bl: F2}                                      # 22
    - {t: V,              bl: F3}                                      # 23
    - {t: B,              bl: F4}                                      # 24
    - {t: Enter}                                                       # 25 — inner thumb (left of split)
    - {t: "─", h: "Scrl↔"}                                             # 26 — &mo SCROLL: hold flips right enc to horiz
    - {t: N}                                                           # 27
    - {t: M,                            bl: "1"}                       # 28
    - {t: ",",                          bl: "2"}                       # 29 — &mm_comma (shifted: ;)
    - {t: ".",                          bl: "3"}                       # 30 — &mm_dot   (shifted: :)
    - {t: "?"}                                                         # 31 — &mm_qmark (shifted: !)
    # ───── Thumb row (positions 32–37) ───────────────────────────────────────
    - {t: "─", h: SYS}                                                 # 32 — &mo SYSTEM
    - {t: Spc, h: RAISE}                                               # 33 — &lt RAISE SPACE
    - {type: trans}                                                    # 34
    - {t: Enter}                                                       # 35
    - {t: Spc, h: RAISE}                                               # 36 — &lt RAISE SPACE
    - {t: NAV, h: "NUM",          bl: "0"}                       # 37 — &td_nav_num

  Combos:
    # Clean background for the combo diagram — every key rendered as transparent.
    - {type: trans}   # 0
    - {type: trans}   # 1
    - {type: trans}   # 2
    - {type: trans}   # 3
    - {type: trans}   # 4
    - {type: trans}   # 5
    - {type: trans}   # 6
    - {type: trans}   # 7
    - {type: trans}   # 8
    - {type: trans}   # 9
    - {type: trans}   # 10
    - {type: trans}   # 11
    - {type: trans}   # 12
    - {type: trans}   # 13
    - {type: trans}   # 14
    - {type: trans}   # 15
    - {type: trans}   # 16
    - {type: trans}   # 17
    - {type: trans}   # 18
    - {type: trans}   # 19
    - {type: trans}   # 20
    - {type: trans}   # 21
    - {type: trans}   # 22
    - {type: trans}   # 23
    - {type: trans}   # 24
    - {type: trans}   # 25
    - {type: trans}   # 26
    - {type: trans}   # 27
    - {type: trans}   # 28
    - {type: trans}   # 29
    - {type: trans}   # 30
    - {type: trans}   # 31
    - {type: trans}   # 32
    - {type: trans}   # 33
    - {type: trans}   # 34
    - {type: trans}   # 35
    - {type: trans}   # 36
    - {type: trans}   # 37

combos:
  # ── Navigation ──────────────────────────────────────────────────────────────
  - {p: [1, 2],     k: Esc,    l: [Combos]}
  - {p: [3, 4],     k: Del,    l: [Combos]}
  - {p: [5, 6],     k: Del,    l: [Combos]}
  - {p: [11, 12],   k: Tab,    l: [Combos]}
  - {p: [13, 14],   k: Bspc,   l: [Combos]}
  - {p: [15, 16],   k: Bspc,   l: [Combos]}
  - {p: [13, 16],   k: Caps,   l: [Combos]}
  # ── Clipboard ───────────────────────────────────────────────────────────────
  - {p: [21, 22],   k: Copy,   l: [Combos]}
  - {p: [22, 23],   k: Paste,  l: [Combos]}
  - {p: [21, 23],   k: Cut,    l: [Combos], align: bottom, offset: 0.15}
  # ── Symbols: left side vertical (top → home) ────────────────────────────────
  - {p: [4, 14],    k: "$",    l: [Combos]}
  - {p: [2, 12],    k: "#",    l: [Combos]}
  - {p: [1, 11],    k: "@",    l: [Combos]}
  # ── Symbols: left side vertical (home → bottom) ─────────────────────────────
  - {p: [12, 22],   k: "\\",   l: [Combos]}
  - {p: [13, 23],   k: "=",    l: [Combos]}
  - {p: [14, 24],   k: "~",    l: [Combos]}
  - {p: [11, 21],   k: "'/`",  l: [Combos]}      # &td_apos_grave: tap=' , double-tap=`
  # ── Symbols: right side vertical (top → home) ───────────────────────────────
  - {p: [5, 15],    k: "^",    l: [Combos]}
  - {p: [6, 16],    k: "+",    l: [Combos]}
  - {p: [7, 17],    k: "*",    l: [Combos]}
  # ── Symbols: horizontal top row ──────────────────────────────────────────────
  - {p: [2, 3],     k: "&",    l: [Combos]}
  # ── Symbols: right side vertical (home → bottom) ────────────────────────────
  - {p: [15, 27],   k: "_",    l: [Combos]}
  - {p: [16, 28],   k: "-",    l: [Combos]}
  - {p: [17, 29],   k: "/",    l: [Combos]}
  - {p: [18, 30],   k: "|",    l: [Combos]}
  # ── Brackets / parens ───────────────────────────────────────────────────────
  - {p: [6, 7],     k: "(",    l: [Combos]}
  - {p: [7, 8],     k: ")",    l: [Combos]}
  - {p: [16, 17],   k: "{",    l: [Combos]}
  - {p: [17, 18],   k: "}",    l: [Combos]}
  - {p: [28, 29],   k: "[",    l: [Combos]}
  - {p: [29, 30],   k: "]",    l: [Combos]}
  # ── Special characters ──────────────────────────────────────────────────────
  - {p: [10, 11],   k: "Å",    l: [Combos]}
  # ── Leader (sticky LEADER layer; LEADER currently has just C-W on W=pos 1) ──
  - {p: [11, 12, 13], k: Lead, l: [Combos], align: top, offset: 1.35}
